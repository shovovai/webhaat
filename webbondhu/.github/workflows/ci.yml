name: CI
on:
  push:
    branches: [main]
  pull_request:
jobs:
  quality:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9.15.4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: webbondhu/pnpm-lock.yaml
      - run: pnpm install --no-frozen-lockfile
        working-directory: webbondhu
      - run: pnpm typecheck
        working-directory: webbondhu
      - run: node scripts/verify-structure.mjs
        working-directory: webbondhu
