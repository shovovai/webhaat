events { worker_connections 1024; }
http {
  server_tokens off;
  upstream web { server web:3000; }
  upstream admin { server admin:3002; }
  upstream api { server api:4000; }
  server {
    listen 80;
    add_header X-Frame-Options DENY always;
    add_header X-Content-Type-Options nosniff always;
    add_header Referrer-Policy strict-origin-when-cross-origin always;
    location /api/ { proxy_pass http://api/; proxy_set_header Host $host; proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for; }
    location /admin/ { proxy_pass http://admin/; proxy_set_header Host $host; }
    location / { proxy_pass http://web/; proxy_set_header Host $host; }
  }
}
